<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Anti-Gravity Store</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    <div class="background-grid"></div>

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo text-gradient">ANTI-GRAVITY</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon active">
                    <i class="fa-solid fa-shopping-cart"></i>
                    <span class="cart-count" id="cart-count">0</span>
                </a>
                <div class="hamburger">
                    <i class="fa-solid fa-bars"></i>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title text-gradient" style="text-align: center; margin-bottom: 40px;">Hardware Cart</h1>
        
        <div class="cart-layout">
            <div class="cart-items" id="cart-items">
                <!-- Injected via JS -->
            </div>
            
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-line">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">$0.00</span>
                </div>
                <div class="summary-line">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-line total-line">
                    <span>Total</span>
                    <span id="summary-total" class="text-gradient">$0.00</span>
                </div>
                <a href="checkout.html" class="btn" style="width: 100%;" id="checkout-btn">Proceed to Checkout</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Anti-Gravity Store. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
