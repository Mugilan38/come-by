<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Anti-Gravity Store</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
    <div class="background-grid"></div>

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo text-gradient">ANTI-GRAVITY</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fa-solid fa-user-astronaut" style="font-size: 3rem; color: var(--secondary-color); margin-bottom: 20px;"></i>
                <h2 class="text-gradient" style="background: var(--neon-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Request Clearance</h2>
                <p>Join the next generation of space pioneers.</p>
            </div>
            
            <form id="signup-form" onsubmit="event.preventDefault(); showNotification('Clearance Granted!', 'success'); setTimeout(() => window.location.href='index.html', 1500);">
                <div class="input-group">
                    <label>Operative Name</label>
                    <div class="auth-input">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Terminal ID (Email)</label>
                    <div class="auth-input">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="commander@orbit.com" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Access Code (Password)</label>
                    <div class="auth-input">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-secondary" style="width: 100%; margin-top: 20px;">Create Profile</button>
            </form>

            <div class="auth-footer">
                <p>Already an operative? <a href="login.html">Neural Auth</a></p>
            </div>
        </div>
    </div>

    <!-- Script for notifications -->
    <script src="js/script.js"></script>
</body>
</html>
